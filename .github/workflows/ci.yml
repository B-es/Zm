name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm install zod
      - run: npm install vitest
      - run: npm ci
      - run: npm run type-check
      - name: Run unit tests
        run: |
          set +e
          output=$(npm run test:unit 2>&1)
          exit_code=$?
          set -e
          if [[ $exit_code -eq 1 && "$output" == *"No test files found"* ]]; then
            echo "No test files found, skipping"
            exit 0
          else
            echo "$output"
            exit $exit_code
          fi

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm install zod
      - run: npm ci
      - run: npm run build
